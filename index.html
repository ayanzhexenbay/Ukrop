<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Укроп — Родословное дерево</title>
  <script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
  <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
  <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
  <script src="config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%; font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1419; color: #e8edf5;
    }
  </style>
</head>
<body>

<div id="app"></div>

<script>
(function () {
  'use strict';

  const STATE = {
    code: sessionStorage.getItem('ukrop_code') || '',
    xmlDoc: null,
    keyMap: {},
    birthdayKeyId: null,
    labelKeyId: null,
    nodes: [],
    edges: [],
    dirty: false,
    cy: null,
    selectedId: null,
  };

  const LABEL_KEYS = ['NodeLabel', 'NodeLabels', 'label', 'name', 'Имя', 'ФИО'];
  const BDAY_KEYS = ['birthday', 'Birthday', 'birthdate', 'День рождения', 'dob'];
  const SKIP_LABEL_KEYS = ['zOrder', 'Expanded', 'url', 'description', 'UserTags'];

  function extractYEdLabel(nodeEl) {
    const all = nodeEl.getElementsByTagName('*');
    for (let i = 0; i < all.length; i++) {
      const el = all[i];
      if (el.localName === 'Label') {
        const text = el.getAttribute('Text') || el.getAttribute('text');
        if (text && text.trim()) return text.trim();
      }
    }
    return '';
  }

  function setYEdLabel(nodeEl, label) {
    const all = nodeEl.getElementsByTagName('*');
    for (let i = 0; i < all.length; i++) {
      const el = all[i];
      if (el.localName === 'Label') {
        el.setAttribute('Text', label);
        return true;
      }
    }
    return false;
  }

  // ─── API (Google Apps Script + Drive) ───
  function apiUrl(params) {
    const base = (window.UKROP_CONFIG && window.UKROP_CONFIG.APPS_SCRIPT_URL) || '';
    if (!base) throw new Error('Настройте APPS_SCRIPT_URL в config.js');
    const q = new URLSearchParams(params);
    return base + (base.includes('?') ? '&' : '?') + q.toString();
  }

  async function loadGraphML(code) {
    const url = apiUrl({ action: 'load', code });
    const res = await fetch(url);
    const text = await res.text();
    if (text.trim().startsWith('{') && text.includes('error')) {
      const err = JSON.parse(text);
      throw new Error(err.error || 'Ошибка загрузки');
    }
    if (!text.includes('<graphml') && !text.includes('<graph')) {
      throw new Error('Ответ не похож на GraphML. Проверьте Apps Script и FILE_ID.');
    }
    return text;
  }

  async function saveGraphML(code, content) {
    const base = window.UKROP_CONFIG.APPS_SCRIPT_URL;
    const res = await fetch(base, {
      method: 'POST',
      body: JSON.stringify({ action: 'save', code, content }),
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Ошибка сохранения');
    return data;
  }

  // ─── GraphML ───
  function parseGraphML(xml) {
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    const parseErr = doc.querySelector('parsererror');
    if (parseErr) throw new Error('Ошибка разбора GraphML');

    const keyMap = {};
    doc.querySelectorAll('key').forEach(k => {
      keyMap[k.getAttribute('id')] = {
        name: k.getAttribute('attr.name') || k.getAttribute('id'),
        forType: k.getAttribute('for'),
        type: k.getAttribute('attr.type') || 'string',
      };
    });

    let birthdayKeyId = Object.entries(keyMap).find(([, v]) =>
      v.forType === 'node' && BDAY_KEYS.some(b => b.toLowerCase() === v.name.toLowerCase())
    )?.[0];

    let labelKeyId = Object.entries(keyMap).find(([, v]) =>
      v.forType === 'node' && LABEL_KEYS.some(l => l.toLowerCase() === v.name.toLowerCase())
    )?.[0];

    const nodes = [];
    doc.querySelectorAll('graph > node, node').forEach(nodeEl => {
      if (nodeEl.parentElement && nodeEl.parentElement.tagName === 'node') return;
      const id = nodeEl.getAttribute('id');
      const attrs = {};
      nodeEl.querySelectorAll(':scope > data').forEach(d => {
        const kid = d.getAttribute('key');
        const kname = keyMap[kid]?.name || kid;
        attrs[kname] = d.textContent;
        attrs['_' + kid] = d.textContent;
      });

      let label = extractYEdLabel(nodeEl);

      if (!label) {
        for (const k of LABEL_KEYS) {
          if (attrs[k]) { label = attrs[k]; labelKeyId = labelKeyId || findKeyByName(keyMap, k); break; }
        }
      }

      if (!label) {
        const desc = attrs.description || attrs['description'];
        if (desc && desc.trim()) label = desc.trim();
      }

      if (!label) {
        for (const d of nodeEl.querySelectorAll(':scope > data')) {
          const kid = d.getAttribute('key');
          const kname = keyMap[kid]?.name || '';
          if (SKIP_LABEL_KEYS.includes(kname) || kname.includes('Geometry') || kname.includes('Style')) continue;
          const val = (d.textContent || '').trim();
          if (val && val.length < 80 && !val.startsWith('<') && !val.startsWith('{')) {
            label = val;
            if (!labelKeyId) labelKeyId = kid;
            break;
          }
        }
      }

      if (!label) label = id;

      let birthday = '';
      for (const k of BDAY_KEYS) {
        if (attrs[k]) { birthday = attrs[k]; birthdayKeyId = birthdayKeyId || findKeyByName(keyMap, k); break; }
      }

      nodes.push({ id, label, birthday, el: nodeEl, attrs });
    });

    const nodeIds = new Set(nodes.map(n => n.id));
    const edges = [];
    doc.querySelectorAll('graph > edge, edge').forEach(edgeEl => {
      const source = edgeEl.getAttribute('source');
      const target = edgeEl.getAttribute('target');
      if (!source || !target || !nodeIds.has(source) || !nodeIds.has(target)) return;
      edges.push({
        id: edgeEl.getAttribute('id') || (source + '_' + target),
        source, target,
      });
    });

    return { doc, keyMap, nodes, edges, birthdayKeyId, labelKeyId };
  }

  function findKeyByName(keyMap, name) {
    return Object.entries(keyMap).find(([, v]) => v.name === name)?.[0];
  }

  function ensureBirthdayKey(doc, keyMap) {
    if (STATE.birthdayKeyId && keyMap[STATE.birthdayKeyId]) return STATE.birthdayKeyId;
    const graphml = doc.documentElement;
    const id = 'ukrop_birthday';
    const keyEl = doc.createElement('key');
    keyEl.setAttribute('id', id);
    keyEl.setAttribute('for', 'node');
    keyEl.setAttribute('attr.name', 'birthday');
    keyEl.setAttribute('attr.type', 'string');
    const graph = doc.querySelector('graph');
    graphml.insertBefore(keyEl, graph);
    keyMap[id] = { name: 'birthday', forType: 'node', type: 'string' };
    STATE.birthdayKeyId = id;
    return id;
  }

  function ensureLabelKey(doc, keyMap, nodeEl) {
    if (STATE.labelKeyId && keyMap[STATE.labelKeyId]) return STATE.labelKeyId;
    const first = nodeEl.querySelector('data');
    if (first) {
      STATE.labelKeyId = first.getAttribute('key');
      return STATE.labelKeyId;
    }
    const id = 'ukrop_label';
    const graphml = doc.documentElement;
    const keyEl = doc.createElement('key');
    keyEl.setAttribute('id', id);
    keyEl.setAttribute('for', 'node');
    keyEl.setAttribute('attr.name', 'NodeLabel');
    keyEl.setAttribute('attr.type', 'string');
    const graph = doc.querySelector('graph');
    graphml.insertBefore(keyEl, graph);
    keyMap[id] = { name: 'NodeLabel', forType: 'node', type: 'string' };
    STATE.labelKeyId = id;
    return id;
  }

  function setNodeData(nodeEl, keyId, value) {
    let dataEl = nodeEl.querySelector(`data[key="${keyId}"]`);
    if (!dataEl) {
      dataEl = nodeEl.ownerDocument.createElement('data');
      dataEl.setAttribute('key', keyId);
      nodeEl.appendChild(dataEl);
    }
    dataEl.textContent = value;
  }

  function serializeGraphML() {
    return new XMLSerializer().serializeToString(STATE.xmlDoc);
  }

  function updateNode(id, label, birthday) {
    const node = STATE.nodes.find(n => n.id === id);
    if (!node) return;
    if (!setYEdLabel(node.el, label)) {
      const bKey = ensureBirthdayKey(STATE.xmlDoc, STATE.keyMap);
      const lKey = ensureLabelKey(STATE.xmlDoc, STATE.keyMap, node.el);
      setNodeData(node.el, lKey, label);
      void bKey;
    }
    if (birthday) {
      const bKey = ensureBirthdayKey(STATE.xmlDoc, STATE.keyMap);
      setNodeData(node.el, bKey, birthday);
    }
    node.label = label;
    node.birthday = birthday;
    STATE.dirty = true;
    renderGraph();
    renderBirthdays();
  }

  // ─── UI helpers ───
  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function formatBday(b) {
    if (!b) return '—';
    const m = b.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (m) return `${m[3]}.${m[2]}.${m[1]}`;
    return b;
  }

  function daysUntil(bday) {
    if (!bday || !/^\d{4}-\d{2}-\d{2}$/.test(bday)) return null;
    const [, y, mo, d] = bday.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    const now = new Date();
    let next = new Date(now.getFullYear(), +mo - 1, +d);
    if (next < new Date(now.getFullYear(), now.getMonth(), now.getDate())) {
      next = new Date(now.getFullYear() + 1, +mo - 1, +d);
    }
    return Math.ceil((next - now) / 86400000);
  }

  function injectStyles() {
    if (document.getElementById('ukrop-styles')) return;
    const s = document.createElement('style');
    s.id = 'ukrop-styles';
    s.textContent = `
      #app { min-height: 100%; display: flex; flex-direction: column; }
      .screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
      .logo { font-size: 2.4rem; font-weight: 700; margin-bottom: 0.5rem;
        background: linear-gradient(135deg, #6bcf8e, #4a9eff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
      .sub { color: #8899aa; margin-bottom: 1.5rem; text-align: center; }
      .card { width: min(400px,100%); background: #1a222d; border: 1px solid #2a3848; border-radius: 14px; padding: 1.5rem; }
      label { display: block; color: #8ab4cc; font-size: 0.85rem; margin-bottom: 0.4rem; }
      input { width: 100%; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid #334; background: #0f1419; color: #fff; font-size: 1rem; margin-bottom: 1rem; }
      .btn { padding: 0.7rem 1.2rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.9rem; }
      .btn-primary { background: #3d8f5a; color: #fff; width: 100%; }
      .btn-primary:hover { background: #4aa86b; }
      .btn-secondary { background: #2a3848; color: #cde; }
      .btn-save { background: #c9a227; color: #111; }
      .btn-save.dirty { box-shadow: 0 0 12px rgba(201,162,39,0.5); }
      .err { color: #ff7b7b; font-size: 0.85rem; margin-top: 0.5rem; }
      .main-layout { flex: 1; display: grid; grid-template-columns: 1fr 300px; grid-template-rows: auto 1fr; height: 100vh; width: 100%; }
      @media (max-width: 800px) { .main-layout { grid-template-columns: 1fr; grid-template-rows: auto auto 1fr; } .sidebar { max-height: 40vh; } }
      .topbar { grid-column: 1 / -1; display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: #1a222d; border-bottom: 1px solid #2a3848; flex-wrap: wrap; }
      .topbar h1 { font-size: 1.2rem; color: #6bcf8e; flex: 1; }
      #cy { grid-column: 1; background: #121820; min-height: 300px; }
      .sidebar { grid-column: 2; background: #1a222d; border-left: 1px solid #2a3848; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 12px; }
      @media (max-width: 800px) { #cy { grid-column: 1; grid-row: 3; } .sidebar { grid-column: 1; grid-row: 2; border-left: none; border-bottom: 1px solid #2a3848; } }
      .panel { background: #0f1419; border-radius: 10px; padding: 12px; border: 1px solid #2a3848; }
      .panel h3 { font-size: 0.9rem; color: #8ab4cc; margin-bottom: 8px; }
      .bday-item { padding: 6px 0; border-bottom: 1px solid #222a35; font-size: 0.85rem; display: flex; justify-content: space-between; gap: 8px; }
      .bday-item.soon { color: #ffd966; }
      .bday-item.today { color: #6bcf8e; font-weight: 700; }
      .edit-form input { margin-bottom: 8px; }
      .hint { font-size: 0.78rem; color: #667; line-height: 1.4; }
      .status { font-size: 0.8rem; color: #6bcf8e; }
      a.back-link { color: #6a9fd8; text-decoration: none; font-size: 0.85rem; }
      a.back-link:hover { text-decoration: underline; }
    `;
    document.head.appendChild(s);
  }

  // ─── Screens ───
  function renderLogin(err) {
    const hasConfig = window.UKROP_CONFIG && window.UKROP_CONFIG.APPS_SCRIPT_URL;
    document.getElementById('app').innerHTML = `
      <div class="screen">
        <div class="logo">🌿 Укроп</div>
        <p class="sub">Родословное дерево · доступ по коду семьи</p>
        <div class="card">
          ${!hasConfig ? '<p class="err">Сайт не настроен: укажите APPS_SCRIPT_URL в config.js</p>' : ''}
          <label for="code">Код доступа</label>
          <input type="password" id="code" placeholder="Введите код семьи" autocomplete="off">
          <button class="btn btn-primary" id="btn-enter" ${!hasConfig ? 'disabled' : ''}>Войти</button>
          ${err ? `<p class="err">${esc(err)}</p>` : ''}
          <p class="hint" style="margin-top:1rem">Данные хранятся в Укроп.graphml на Google Drive.<br>
          <a class="back-link" href="https://ayanzhexenbay.github.io/Labyrinth/">← Игра Лабиринт</a></p>
        </div>
      </div>`;
    const inp = document.getElementById('code');
    if (STATE.code) inp.value = STATE.code;
    document.getElementById('btn-enter').onclick = () => tryLogin(inp.value);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(inp.value); });
  }

  async function tryLogin(code) {
    try {
      const xml = await loadGraphML(code.trim());
      STATE.code = code.trim();
      sessionStorage.setItem('ukrop_code', STATE.code);
      const parsed = parseGraphML(xml);
      STATE.xmlDoc = parsed.doc;
      STATE.keyMap = parsed.keyMap;
      STATE.nodes = parsed.nodes;
      STATE.edges = parsed.edges;
      STATE.birthdayKeyId = parsed.birthdayKeyId;
      STATE.labelKeyId = parsed.labelKeyId;
      STATE.dirty = false;
      renderMain();
    } catch (e) {
      renderLogin(e.message);
    }
  }

  function renderMain() {
    document.getElementById('app').innerHTML = `
      <div class="main-layout">
        <div class="topbar">
          <h1>🌿 Укроп — родословное дерево</h1>
          <span class="status" id="save-status"></span>
          <button class="btn btn-save" id="btn-save">Сохранить на Drive</button>
          <button class="btn btn-secondary" id="btn-logout">Выйти</button>
        </div>
        <div id="cy"></div>
        <div class="sidebar">
          <div class="panel" id="edit-panel">
            <h3>Человек</h3>
            <p class="hint">Кликните на узел в дереве</p>
          </div>
          <div class="panel">
            <h3>🎂 Дни рождения</h3>
            <div id="bday-list"></div>
          </div>
        </div>
      </div>`;

    document.getElementById('btn-logout').onclick = () => {
      sessionStorage.removeItem('ukrop_code');
      STATE.code = '';
      renderLogin();
    };

    document.getElementById('btn-save').onclick = async () => {
      const btn = document.getElementById('btn-save');
      const st = document.getElementById('save-status');
      btn.disabled = true;
      st.textContent = 'Сохранение...';
      try {
        await saveGraphML(STATE.code, serializeGraphML());
        STATE.dirty = false;
        btn.classList.remove('dirty');
        st.textContent = '✓ Сохранено на Google Drive';
        setTimeout(() => { st.textContent = ''; }, 3000);
      } catch (e) {
        st.textContent = '';
        alert(e.message);
      }
      btn.disabled = false;
    };

    renderGraph();
    renderBirthdays();
    renderEditPanel(null);
  }

  function renderGraph() {
    const container = document.getElementById('cy');
    if (!container) return;

    if (STATE.cy) STATE.cy.destroy();

    const elements = [
      ...STATE.nodes.map(n => ({
        data: {
          id: n.id,
          label: n.label + (n.birthday ? '\n🎂 ' + formatBday(n.birthday) : ''),
          birthday: n.birthday,
        },
      })),
      ...STATE.edges.map(e => ({ data: { id: e.id, source: e.source, target: e.target } })),
    ];

    STATE.cy = cytoscape({
      container,
      elements,
      style: [
        { selector: 'node', style: {
          'background-color': '#3d8f5a', 'label': 'data(label)', 'color': '#e8edf5',
          'text-valign': 'center', 'text-halign': 'center', 'font-size': '10px',
          'width': 80, 'height': 80, 'text-wrap': 'wrap', 'text-max-width': 70,
          'border-width': 2, 'border-color': '#6bcf8e',
        }},
        { selector: 'node:selected', style: { 'background-color': '#4a9eff', 'border-color': '#7bc8ff' }},
        { selector: 'edge', style: {
          'width': 2, 'line-color': '#445566', 'target-arrow-color': '#445566',
          'target-arrow-shape': 'triangle', 'curve-style': 'bezier',
        }},
      ],
      layout: { name: 'dagre', rankDir: 'TB', nodeSep: 40, rankSep: 60, animate: true },
    });

    STATE.cy.on('tap', 'node', evt => {
      const id = evt.target.id();
      STATE.selectedId = id;
      renderEditPanel(id);
    });
  }

  function renderEditPanel(id) {
    const panel = document.getElementById('edit-panel');
    if (!panel) return;
    if (!id) {
      panel.innerHTML = '<h3>Человек</h3><p class="hint">Кликните на узел в дереве</p>';
      return;
    }
    const node = STATE.nodes.find(n => n.id === id);
    if (!node) return;
    panel.innerHTML = `
      <h3>Редактирование</h3>
      <div class="edit-form">
        <label>Имя</label>
        <input type="text" id="edit-name" value="${esc(node.label)}">
        <label>День рождения</label>
        <input type="date" id="edit-bday" value="${node.birthday && /^\d{4}-\d{2}-\d{2}$/.test(node.birthday) ? node.birthday : ''}">
        <p class="hint">Формат даты: ГГГГ-ММ-ДД. Пусто — без даты.</p>
        <button class="btn btn-primary" id="edit-apply">Применить</button>
      </div>`;
    document.getElementById('edit-apply').onclick = () => {
      const name = document.getElementById('edit-name').value.trim();
      const bday = document.getElementById('edit-bday').value;
      if (!name) { alert('Введите имя'); return; }
      updateNode(id, name, bday);
      document.getElementById('btn-save').classList.add('dirty');
      renderEditPanel(id);
    };
  }

  function renderBirthdays() {
    const list = document.getElementById('bday-list');
    if (!list) return;
    const withBday = STATE.nodes
      .filter(n => n.birthday)
      .map(n => ({ ...n, days: daysUntil(n.birthday) }))
      .sort((a, b) => {
        const da = a.birthday.slice(5), db = b.birthday.slice(5);
        return da.localeCompare(db);
      });

    if (!withBday.length) {
      list.innerHTML = '<p class="hint">Добавьте даты рождения, кликнув на человека в дереве</p>';
      return;
    }

    list.innerHTML = withBday.map(n => {
      let cls = 'bday-item';
      let suffix = '';
      if (n.days === 0) { cls += ' today'; suffix = ' — сегодня!'; }
      else if (n.days !== null && n.days <= 14) { cls += ' soon'; suffix = ` — через ${n.days} дн.`; }
      return `<div class="${cls}"><span>${esc(n.label)}</span><span>${formatBday(n.birthday)}${suffix}</span></div>`;
    }).join('');
  }

  // ─── Init ───
  injectStyles();
  cytoscape.use(cytoscapeDagre);

  if (STATE.code && window.UKROP_CONFIG && window.UKROP_CONFIG.APPS_SCRIPT_URL) {
    tryLogin(STATE.code);
  } else {
    renderLogin();
  }
})();
</script>
</body>
</html>
