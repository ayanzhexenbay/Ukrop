<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Укроп — Родословное дерево</title>
  <script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
  <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
  <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
  <script src="https://unpkg.com/cytoscape-node-html-label@1.2.2/dist/cytoscape-node-html-label.js"></script>
  <script src="config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%; width: 100%; font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1419; color: #e8edf5;
      overflow: hidden;
    }
  </style>
</head>
<body>

<div id="app"></div>

<script>
(function () {
  'use strict';

  const STATE = {
    code: sessionStorage.getItem('ukrop_code') || '',
    xmlDoc: null,
    keyMap: {},
    birthdayKeyId: null,
    labelKeyId: null,
    userTagsKeyId: null,
    nodes: [],
    edges: [],
    dirty: false,
    cy: null,
    selectedId: null,
    viewMode: sessionStorage.getItem('ukrop_view') || 'tree',
  };

  const MIXED_WIDE_MIN = 2;

  const GEN_BG_COLORS = [
    { color: '#8a6b3a', opacity: 0.16 },
    { color: '#3a5a8a', opacity: 0.16 },
    { color: '#3a7a5a', opacity: 0.16 },
    { color: '#7a4a6a', opacity: 0.16 },
    { color: '#6a5a3a', opacity: 0.13 },
    { color: '#4a6a7a', opacity: 0.13 },
    { color: '#5a4a7a', opacity: 0.13 },
    { color: '#4a7a6a', opacity: 0.13 },
  ];

  const LABEL_KEYS = ['NodeLabel', 'NodeLabels', 'label', 'name', 'Имя', 'ФИО'];
  const BDAY_KEYS = ['birthday', 'Birthday', 'birthdate', 'День рождения', 'dob'];
  const SKIP_LABEL_KEYS = ['zOrder', 'Expanded', 'url', 'description', 'UserTags'];
  const Y_JSON_NS = 'http://www.yworks.com/xml/yfiles-common/3.0';

  function isJsonElement(el) {
    if (!el) return false;
    const ln = (el.localName || '').toLowerCase();
    const tn = (el.tagName || '').toLowerCase();
    return ln === 'json' || tn === 'y:json' || tn.endsWith(':json');
  }

  function findJsonEl(container) {
    if (!container) return null;
    for (const e of container.getElementsByTagName('*')) {
      if (isJsonElement(e)) return e;
    }
    return null;
  }

  function ensureJsonEl(dataEl, doc) {
    let jsonEl = findJsonEl(dataEl);
    if (jsonEl) return jsonEl;
    if (doc.createElementNS) {
      try {
        jsonEl = doc.createElementNS(Y_JSON_NS, 'y:Json');
      } catch {
        jsonEl = doc.createElement('y:Json');
      }
    } else {
      jsonEl = doc.createElement('y:Json');
    }
    dataEl.appendChild(jsonEl);
    return jsonEl;
  }

  function extractYEdLabel(nodeEl) {
    const all = nodeEl.getElementsByTagName('*');
    for (let i = 0; i < all.length; i++) {
      const el = all[i];
      if (el.localName === 'Label') {
        const text = el.getAttribute('Text') || el.getAttribute('text');
        if (text && text.trim()) return text.trim();
      }
    }
    return '';
  }

  function setYEdLabel(nodeEl, label) {
    const all = nodeEl.getElementsByTagName('*');
    for (let i = 0; i < all.length; i++) {
      const el = all[i];
      if (el.localName === 'Label') {
        el.setAttribute('Text', label);
        return true;
      }
    }
    return false;
  }

  function genPersonId() {
    return 'p' + Math.random().toString(36).slice(2, 10);
  }

  function genderRadioGroup(name, selected) {
    return `<div class="gender-row">
      <label><input type="radio" name="${name}" value="male" ${selected === 'male' ? 'checked' : ''}> Мужчина</label>
      <label><input type="radio" name="${name}" value="female" ${selected === 'female' ? 'checked' : ''}> Женщина</label>
    </div>`;
  }

  function readGender(name) {
    return document.querySelector(`input[name="${name}"]:checked`)?.value || '';
  }

  function findUserTagsKeyId(keyMap) {
    const entry = Object.entries(keyMap).find(([, v]) =>
      v.name === 'UserTags' || String(v.name).toLowerCase() === 'usertags'
    );
    return entry ? entry[0] : 'd6';
  }

  function readJsonFromDataEl(dataEl) {
    if (!dataEl) return {};
    const jsonEl = findJsonEl(dataEl);
    const text = (jsonEl ? jsonEl.textContent : dataEl.textContent || '').trim();
    if (!text) return {};
    try { return JSON.parse(text); } catch { return {}; }
  }

  function stripUkropViewFromDoc() {
    const graph = STATE.xmlDoc?.querySelector('graph');
    if (!graph) return;
    const kid = findUserTagsKeyId(STATE.keyMap);
    const dataEl = graph.querySelector(':scope > data[key="' + kid + '"]');
    if (!dataEl) return;
    const wrapper = readJsonFromDataEl(dataEl);
    if (!wrapper.ukropView) return;
    delete wrapper.ukropView;
    const jsonEl = ensureJsonEl(dataEl, STATE.xmlDoc);
    jsonEl.textContent = JSON.stringify(wrapper);
  }

  function splitCoupleName(label) {
    const parts = label.split(/\s*[-–—/|]\s*|\s+и\s+/i).map(s => s.trim()).filter(Boolean);
    if (parts.length < 2) return null;
    if (parts.length === 2 && /^\d{4}$/.test(parts[1])) return null;
    return parts.slice(0, 2);
  }

  function cleanPersonLabel(label) {
    const s = String(label || '').trim();
    const m = s.match(/^(.+?)[-–—](\d{4})$/);
    return m ? m[1].trim() : s;
  }

  function normalizeUkropPeople(ukrop) {
    if (!ukrop?.people) return;
    ukrop.people.forEach(p => { delete p.role; });
  }

  function normalizeUkropType(ukrop) {
    if (!ukrop?.people) return ukrop;
    normalizeUkropPeople(ukrop);
    if (ukrop.type === 'couple' && ukrop.people.length >= 2) {
      const p0 = ukrop.people[0];
      const p1 = ukrop.people[1];
      const n0 = (p0.name || '').trim();
      const n1 = (p1.name || '').trim();
      if (!n1 || /^\d{4}$/.test(n1)) {
        ukrop.type = 'person';
        ukrop.people = [{ ...p0, name: n0 || cleanPersonLabel(n1) || '?' }];
      }
    }
    return ukrop;
  }

  function primaryBirthday(ukrop) {
    if (!ukrop?.people?.length) return '';
    if (ukrop.type === 'person') return ukrop.people[0].birthday || '';
    return ukrop.people.map(p => p.birthday).find(Boolean) || '';
  }

  function syncLegacyBirthday(nodeEl, ukrop) {
    if (!STATE.xmlDoc) return;
    const kid = ensureBirthdayKey(STATE.xmlDoc, STATE.keyMap);
    setNodeData(nodeEl, kid, primaryBirthday(ukrop));
  }

  function migrateLabelToUkrop(label, birthday) {
    const pair = splitCoupleName(label);
    if (pair) {
      return {
        type: 'couple',
        people: [
          { id: genPersonId(), name: pair[0], gender: '', birthday: '' },
          { id: genPersonId(), name: pair[1], gender: '', birthday: '' },
        ],
      };
    }
    return {
      type: 'person',
      people: [{ id: genPersonId(), name: cleanPersonLabel(label), gender: '', birthday: birthday || '' }],
    };
  }

  function parseUkropFromNode(nodeEl, label, birthday, keyMap) {
    const kid = findUserTagsKeyId(keyMap);
    const dataEl = nodeEl.querySelector(`data[key="${kid}"]`);
    const wrapper = readJsonFromDataEl(dataEl);
    if (wrapper.ukrop && Array.isArray(wrapper.ukrop.people) && wrapper.ukrop.people.length) {
      const ukrop = normalizeUkropType(wrapper.ukrop);
      ukrop.people.forEach(p => { if (!p.id) p.id = genPersonId(); });
      if (birthday && ukrop.type === 'person' && ukrop.people[0] && !ukrop.people[0].birthday) {
        ukrop.people[0].birthday = birthday;
      }
      return ukrop;
    }
    const ukrop = migrateLabelToUkrop(label, birthday);
    if (birthday && ukrop.type === 'person' && ukrop.people[0]) {
      ukrop.people[0].birthday = birthday;
    }
    return ukrop;
  }

  function ukropYEdLabel(ukrop) {
    if (ukrop.type === 'couple' && ukrop.people.length >= 2) {
      return ukrop.people.map(p => p.name).join(' - ');
    }
    return ukrop.people[0]?.name || '';
  }

  function ukropDisplayLabel(ukrop) {
    const people = ukrop.people || [];
    if (ukrop.type === 'couple' && people.length >= 2) {
      return `${people[0].name} - ${people[1].name}`;
    }
    return people[0]?.name || '?';
  }

  function ukropNodeSublabel(ukrop) {
    if (ukrop.type === 'couple' && ukrop.people.length >= 2) {
      const a = ukrop.people[0];
      const b = ukrop.people[1];
      const da = a.birthday ? formatBday(a.birthday) : '';
      const db = b.birthday ? formatBday(b.birthday) : '';
      if (da && db) return `\n[${da} - ${db}]`;
      if (da) return `\n[${da}]`;
      if (db) return `\n[${db}]`;
      return '';
    }
    const bday = ukrop.people[0]?.birthday;
    return bday ? `\n[${formatBday(bday)}]` : '';
  }

  function writeUkropToNode(nodeEl, ukrop, keyMap) {
    const kid = findUserTagsKeyId(keyMap);
    let dataEl = nodeEl.querySelector(`data[key="${kid}"]`);
    if (!dataEl) {
      dataEl = nodeEl.ownerDocument.createElement('data');
      dataEl.setAttribute('key', kid);
      nodeEl.appendChild(dataEl);
    }
    const wrapper = readJsonFromDataEl(dataEl);
    wrapper.ukrop = ukrop;
    const jsonEl = ensureJsonEl(dataEl, nodeEl.ownerDocument);
    jsonEl.textContent = JSON.stringify(wrapper);
    setYEdLabel(nodeEl, ukropYEdLabel(ukrop));
    syncLegacyBirthday(nodeEl, ukrop);
  }

  function collectAllPeople() {
    const result = [];
    for (const n of STATE.nodes) {
      for (const p of (n.ukrop?.people || [])) {
        result.push({ ...p, nodeId: n.id });
      }
    }
    return result;
  }

  function nodeKind(ukrop) {
    if (ukrop.type === 'couple') return 'couple';
    const g = ukrop.people[0]?.gender;
    if (g === 'male') return 'male';
    if (g === 'female') return 'female';
    return 'person';
  }

  // ─── API (Google Apps Script + Drive) ───
  function apiUrl(params) {
    const base = (window.UKROP_CONFIG && window.UKROP_CONFIG.APPS_SCRIPT_URL) || '';
    if (!base) throw new Error('Настройте APPS_SCRIPT_URL в config.js');
    const q = new URLSearchParams(params);
    return base + (base.includes('?') ? '&' : '?') + q.toString();
  }

  async function loadGraphML(code) {
    const url = apiUrl({ action: 'load', code });
    const res = await fetch(url);
    const text = await res.text();
    if (text.trim().startsWith('{') && text.includes('error')) {
      const err = JSON.parse(text);
      throw new Error(err.error || 'Ошибка загрузки');
    }
    if (!text.includes('<graphml') && !text.includes('<graph')) {
      throw new Error('Ответ не похож на GraphML. Проверьте Apps Script и FILE_ID.');
    }
    return text;
  }

  function isSaveResponse(data) {
    return data && data.ok && (
      data.action === 'save' || data.message === 'Сохранено на Google Drive'
    );
  }

  function postAppsScriptJson(url, payload) {
    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', url, true);
      xhr.setRequestHeader('Content-Type', 'text/plain;charset=utf-8');
      xhr.onload = () => {
        try { resolve(JSON.parse(xhr.responseText)); }
        catch { resolve(null); }
      };
      xhr.onerror = () => reject(new Error('Сетевая ошибка при сохранении'));
      xhr.send(payload);
    });
  }

  async function saveGraphML(code, content) {
    const base = window.UKROP_CONFIG.APPS_SCRIPT_URL;
    const payload = JSON.stringify({ action: 'save', code, content });
    let lastErr = new Error('Ошибка сохранения');

    for (let attempt = 0; attempt < 3; attempt++) {
      let data;
      try {
        data = await postAppsScriptJson(base, payload);
      } catch (e) {
        lastErr = e;
        if (attempt < 2) {
          await new Promise(r => setTimeout(r, 500));
          continue;
        }
        throw lastErr;
      }
      if (isSaveResponse(data)) return data;
      if (data && data.ok) {
        lastErr = new Error('Файл не был сохранён на Drive. Нажмите «Сохранить» ещё раз.');
      } else if (data && data.error) {
        lastErr = new Error(data.error);
      } else {
        lastErr = new Error('Некорректный ответ сервера. Попробуйте ещё раз.');
      }
      if (attempt < 2) await new Promise(r => setTimeout(r, 500));
    }
    throw lastErr;
  }

  // ─── GraphML ───
  function parseGraphML(xml) {
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    const parseErr = doc.querySelector('parsererror');
    if (parseErr) throw new Error('Ошибка разбора GraphML');

    const keyMap = {};
    doc.querySelectorAll('key').forEach(k => {
      keyMap[k.getAttribute('id')] = {
        name: k.getAttribute('attr.name') || k.getAttribute('id'),
        forType: k.getAttribute('for'),
        type: k.getAttribute('attr.type') || 'string',
      };
    });

    let birthdayKeyId = Object.entries(keyMap).find(([, v]) =>
      v.forType === 'node' && BDAY_KEYS.some(b => b.toLowerCase() === v.name.toLowerCase())
    )?.[0];

    let labelKeyId = Object.entries(keyMap).find(([, v]) =>
      v.forType === 'node' && LABEL_KEYS.some(l => l.toLowerCase() === v.name.toLowerCase())
    )?.[0];

    const graph = doc.getElementsByTagName('graph')[0];
    if (!graph) throw new Error('В GraphML нет элемента graph');

    const nodes = [];
    const nodeEls = graph.getElementsByTagName('node');
    for (let ni = 0; ni < nodeEls.length; ni++) {
      const nodeEl = nodeEls[ni];
      if (nodeEl.parentElement !== graph) continue;
      const id = nodeEl.getAttribute('id');
      const attrs = {};
      nodeEl.querySelectorAll(':scope > data').forEach(d => {
        const kid = d.getAttribute('key');
        const kname = keyMap[kid]?.name || kid;
        attrs[kname] = d.textContent;
        attrs['_' + kid] = d.textContent;
      });

      let label = extractYEdLabel(nodeEl);

      if (!label) {
        for (const k of LABEL_KEYS) {
          if (attrs[k]) { label = attrs[k]; labelKeyId = labelKeyId || findKeyByName(keyMap, k); break; }
        }
      }

      if (!label) {
        const desc = attrs.description || attrs['description'];
        if (desc && desc.trim()) label = desc.trim();
      }

      if (!label) {
        for (const d of nodeEl.querySelectorAll(':scope > data')) {
          const kid = d.getAttribute('key');
          const kname = keyMap[kid]?.name || '';
          if (SKIP_LABEL_KEYS.includes(kname) || kname.includes('Geometry') || kname.includes('Style')) continue;
          const val = (d.textContent || '').trim();
          if (val && val.length < 80 && !val.startsWith('<') && !val.startsWith('{')) {
            label = val;
            if (!labelKeyId) labelKeyId = kid;
            break;
          }
        }
      }

      if (!label) label = id;

      let birthday = '';
      for (const k of BDAY_KEYS) {
        if (attrs[k]) { birthday = attrs[k]; birthdayKeyId = birthdayKeyId || findKeyByName(keyMap, k); break; }
      }

      const ukrop = parseUkropFromNode(nodeEl, label, birthday, keyMap);

      nodes.push({
        id, label: ukropDisplayLabel(ukrop), birthday, el: nodeEl, attrs, ukrop,
        kind: nodeKind(ukrop),
      });
    }

    const userTagsKeyId = findUserTagsKeyId(keyMap);

    const nodeIds = new Set(nodes.map(n => n.id));
    const edges = [];
    const edgeEls = graph.getElementsByTagName('edge');
    for (let ei = 0; ei < edgeEls.length; ei++) {
      const edgeEl = edgeEls[ei];
      if (edgeEl.parentElement !== graph) continue;
      const source = edgeEl.getAttribute('source');
      const target = edgeEl.getAttribute('target');
      if (!source || !target || !nodeIds.has(source) || !nodeIds.has(target)) continue;
      edges.push({
        id: edgeEl.getAttribute('id') || (source + '_' + target),
        source, target,
      });
    }

    return { doc, keyMap, nodes, edges, birthdayKeyId, labelKeyId, userTagsKeyId };
  }

  function findKeyByName(keyMap, name) {
    return Object.entries(keyMap).find(([, v]) => v.name === name)?.[0];
  }

  function ensureBirthdayKey(doc, keyMap) {
    if (STATE.birthdayKeyId && keyMap[STATE.birthdayKeyId]) return STATE.birthdayKeyId;
    const graphml = doc.documentElement;
    const id = 'ukrop_birthday';
    const keyEl = doc.createElement('key');
    keyEl.setAttribute('id', id);
    keyEl.setAttribute('for', 'node');
    keyEl.setAttribute('attr.name', 'birthday');
    keyEl.setAttribute('attr.type', 'string');
    const graph = doc.querySelector('graph');
    graphml.insertBefore(keyEl, graph);
    keyMap[id] = { name: 'birthday', forType: 'node', type: 'string' };
    STATE.birthdayKeyId = id;
    return id;
  }

  function ensureLabelKey(doc, keyMap, nodeEl) {
    if (STATE.labelKeyId && keyMap[STATE.labelKeyId]) return STATE.labelKeyId;
    const first = nodeEl.querySelector('data');
    if (first) {
      STATE.labelKeyId = first.getAttribute('key');
      return STATE.labelKeyId;
    }
    const id = 'ukrop_label';
    const graphml = doc.documentElement;
    const keyEl = doc.createElement('key');
    keyEl.setAttribute('id', id);
    keyEl.setAttribute('for', 'node');
    keyEl.setAttribute('attr.name', 'NodeLabel');
    keyEl.setAttribute('attr.type', 'string');
    const graph = doc.querySelector('graph');
    graphml.insertBefore(keyEl, graph);
    keyMap[id] = { name: 'NodeLabel', forType: 'node', type: 'string' };
    STATE.labelKeyId = id;
    return id;
  }

  function setNodeData(nodeEl, keyId, value) {
    let dataEl = nodeEl.querySelector(`data[key="${keyId}"]`);
    if (!dataEl) {
      dataEl = nodeEl.ownerDocument.createElement('data');
      dataEl.setAttribute('key', keyId);
      nodeEl.appendChild(dataEl);
    }
    dataEl.textContent = value;
  }

  function updateNodeUkrop(id, ukrop) {
    const node = STATE.nodes.find(n => n.id === id);
    if (!node) return;
    normalizeUkropType(ukrop);
    writeUkropToNode(node.el, ukrop, STATE.keyMap);
    node.ukrop = ukrop;
    node.label = ukropDisplayLabel(ukrop);
    node.kind = nodeKind(ukrop);
    node.birthday = ukrop.people[0]?.birthday || '';
    STATE.dirty = true;
    if (STATE.cy) {
      refreshNodeOnGraph(id);
    } else {
      renderGraph();
    }
    renderBirthdays();
  }

  function nodeCyData(n) {
    return {
      id: n.id,
      nameLine: n.label,
      bdayLine: ukropNodeSublabel(n.ukrop).trim(),
      kind: n.kind,
    };
  }

  function setupHtmlLabels(cy) {
    if (!cy.nodeHtmlLabel) return;
    cy.nodeHtmlLabel([{
      query: 'node[!genBg]',
      halign: 'center',
      valign: 'center',
      halignBox: 'center',
      valignBox: 'center',
      tpl(data) {
        const bday = data.bdayLine
          ? `<div class="cy-bday">${escHtml(data.bdayLine)}</div>` : '';
        const isCouple = data.kind === 'couple';
        const wrapCls = ['cy-node-text', bday && 'has-bday', isCouple && bday && 'couple'].filter(Boolean).join(' ');
        return `<div class="${wrapCls}"><div class="cy-name">${escHtml(data.nameLine)}</div>${bday}</div>`;
      },
    }]);
  }

  function refreshNodeOnGraph(id) {
    if (!STATE.cy) return;
    const node = STATE.nodes.find(n => n.id === id);
    if (!node) return;
    const ele = STATE.cy.getElementById(id);
    if (ele.nonempty()) {
      ele.data(nodeCyData(node));
      setupHtmlLabels(STATE.cy);
    }
  }

  function applyEditPanel(nodeId) {
    const node = STATE.nodes.find(n => n.id === nodeId);
    if (!node) return { ok: false };

    const ukrop = JSON.parse(JSON.stringify(node.ukrop));

    if (document.getElementById('p0-name') && document.getElementById('p1-name')) {
      if (ukrop.type !== 'couple' || ukrop.people.length < 2) return { ok: false };
      const p0 = ukrop.people[0];
      const p1 = ukrop.people[1];
      p0.name = document.getElementById('p0-name').value.trim();
      p1.name = document.getElementById('p1-name').value.trim();
      p0.birthday = document.getElementById('p0-bday').value;
      p1.birthday = document.getElementById('p1-bday').value;
      p0.gender = readGender('p0-gender');
      p1.gender = readGender('p1-gender');
      if (!p0.name || !p1.name) return { ok: false, error: 'Введите оба имени' };
      if (!p0.gender || !p1.gender) return { ok: false, error: 'Укажите пол для обоих' };
      updateNodeUkrop(nodeId, ukrop);
      return { ok: true };
    }

    const editName = document.getElementById('edit-name');
    if (editName) {
      const name = editName.value.trim();
      const bday = document.getElementById('edit-bday')?.value || '';
      const gender = readGender('gender');
      if (!name) return { ok: false, error: 'Введите имя' };
      if (!gender) return { ok: false, error: 'Укажите пол' };
      ukrop.type = 'person';
      ukrop.people = [{ ...(ukrop.people[0] || { id: genPersonId() }), name, gender, birthday: bday }];
      updateNodeUkrop(nodeId, ukrop);
      return { ok: true };
    }

    return { ok: false };
  }

  function wireEditPanelAutoApply(nodeId) {
    const panel = document.getElementById('edit-panel');
    if (!panel) return;
    panel.querySelectorAll('input[type="date"]').forEach(inp => {
      inp.addEventListener('change', () => {
        applyEditPanel(nodeId);
      });
    });
  }

  function serializeGraphML() {
    return new XMLSerializer().serializeToString(STATE.xmlDoc);
  }

  async function persistToDrive() {
    stripUkropViewFromDoc();
    await saveGraphML(STATE.code, serializeGraphML());
    STATE.dirty = false;
  }

  function setSaveStatus(message, clearMs = 0) {
    const st = document.getElementById('save-status');
    if (!st) return;
    st.textContent = message;
    if (clearMs > 0) {
      setTimeout(() => { if (st.textContent === message) st.textContent = ''; }, clearMs);
    }
  }

  async function saveNodeChangesToDrive(nodeId, statusMessage) {
    const btnApply = document.getElementById('edit-apply');
    if (btnApply) btnApply.disabled = true;
    setSaveStatus('Сохранение...');
    try {
      await persistToDrive();
      if (nodeId) renderEditPanel(nodeId);
      setSaveStatus(statusMessage || '✓ Применено и сохранено на Drive', 4000);
    } catch (e) {
      setSaveStatus('');
      STATE.dirty = true;
      alert(e.message);
    } finally {
      const applyBtn = document.getElementById('edit-apply');
      if (applyBtn) applyBtn.disabled = false;
    }
  }

  function formatBday(b) {
    if (!b) return '—';
    const m = b.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (m) return `${m[3]}.${m[2]}.${m[1]}`;
    return b;
  }

  function daysUntil(bday) {
    if (!bday || !/^\d{4}-\d{2}-\d{2}$/.test(bday)) return null;
    const [, y, mo, d] = bday.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    const now = new Date();
    let next = new Date(now.getFullYear(), +mo - 1, +d);
    if (next < new Date(now.getFullYear(), now.getMonth(), now.getDate())) {
      next = new Date(now.getFullYear() + 1, +mo - 1, +d);
    }
    return Math.ceil((next - now) / 86400000);
  }

  function initMobileSheet() {
    const sheet = document.getElementById('mobile-sheet');
    const handle = document.getElementById('sheet-handle');
    const hint = document.getElementById('sheet-hint');
    if (!sheet || !handle) return;

    const SHEET_KEY = 'ukrop_sheet_h';
    const MOBILE_MQ = '(max-width: 900px)';
    const COLLAPSED = 52;

    function isMobile() {
      return window.matchMedia(MOBILE_MQ).matches;
    }

    function rowH() {
      const row = document.querySelector('.main-row');
      return row ? row.clientHeight : window.innerHeight;
    }

    function halfH() { return rowH() * 0.42; }
    function maxH() { return rowH() * 0.58; }

    function sheetState(h) {
      if (h <= COLLAPSED + 10) return 'collapsed';
      if (h >= halfH() - 24) return 'half';
      return 'peek';
    }

    function applyHeight(h, animate) {
      if (!isMobile()) {
        sheet.style.height = '';
        sheet.style.transition = '';
        delete sheet.dataset.sheet;
        return;
      }
      const clamped = Math.min(maxH(), Math.max(COLLAPSED, h));
      sheet.style.transition = animate ? 'height 0.22s ease-out' : 'none';
      sheet.style.height = `${Math.round(clamped)}px`;
      sheet.dataset.sheet = sheetState(clamped);
      if (hint) {
        hint.textContent = sheet.dataset.sheet === 'collapsed'
          ? 'Потяните вверх — открыть настройки'
          : 'Потяните вниз — свернуть';
      }
      sessionStorage.setItem(SHEET_KEY, String(Math.round(clamped)));
      scheduleCyResize();
    }

    let dragging = false;
    let moved = false;
    let startY = 0;
    let startH = 0;

    function onStart(clientY) {
      if (!isMobile()) return;
      dragging = true;
      moved = false;
      startY = clientY;
      startH = sheet.getBoundingClientRect().height;
      sheet.style.transition = 'none';
    }

    function onMove(clientY) {
      if (!dragging || !isMobile()) return;
      const dy = clientY - startY;
      if (Math.abs(dy) > 4) moved = true;
      const next = Math.min(maxH(), Math.max(COLLAPSED, startH - dy));
      sheet.style.height = `${next}px`;
      sheet.dataset.sheet = sheetState(next);
    }

    function onEnd() {
      if (!dragging) return;
      dragging = false;
      if (!isMobile()) return;
      const h = sheet.getBoundingClientRect().height;
      const snapCollapsed = COLLAPSED + (halfH() - COLLAPSED) * 0.28;
      const snapHalf = halfH();
      let snap;
      if (h < snapCollapsed) snap = COLLAPSED;
      else if (h < snapHalf + (maxH() - snapHalf) * 0.35) snap = snapHalf;
      else snap = maxH();
      applyHeight(snap, true);
    }

    const saved = Number(sessionStorage.getItem(SHEET_KEY));
    applyHeight(saved > COLLAPSED ? saved : halfH(), false);

    handle.addEventListener('touchstart', e => onStart(e.touches[0].clientY), { passive: true });
    handle.addEventListener('touchmove', e => {
      onMove(e.touches[0].clientY);
      if (dragging) e.preventDefault();
    }, { passive: false });
    handle.addEventListener('touchend', onEnd);
    handle.addEventListener('mousedown', e => { onStart(e.clientY); e.preventDefault(); });
    window.addEventListener('mousemove', e => { if (dragging) onMove(e.clientY); });
    window.addEventListener('mouseup', onEnd);
    handle.addEventListener('click', () => {
      if (!isMobile() || moved) return;
      applyHeight(sheet.dataset.sheet === 'collapsed' ? halfH() : COLLAPSED, true);
    });
    window.addEventListener('resize', () => {
      if (!isMobile()) applyHeight(0, false);
      else applyHeight(sheet.getBoundingClientRect().height, false);
    });
  }

  async function downloadTreePng() {
    const cy = STATE.cy;
    if (!cy || cy.nodes().length === 0) {
      alert('Дерево ещё не загружено');
      return;
    }

    await withExportUi('Создание PNG…', async () => {
      const status = document.getElementById('save-status');
      const selected = cy.$(':selected');
      selected.unselect();
      const cyRoot = document.getElementById('cy');
      const overlays = hideHtmlOverlays(cyRoot);
      applyPngExportLabels(cy);

      try {
        const blob = await cy.png({ output: 'blob-promise', bg: '#121820', full: true, scale: 4 });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Ukrop-derevo-${exportFileStamp()}.png`;
        a.click();
        URL.revokeObjectURL(url);
        if (status) status.textContent = 'PNG сохранён на компьютер';
      } catch (e) {
        console.error(e);
        if (status) status.textContent = '';
        alert(e.message || 'Не удалось создать PNG');
      } finally {
        clearPngExportLabels(cy);
        showHtmlOverlays(overlays);
        if (selected.nonempty()) selected.select();
      }
    });
  }

  function computeGenerations(edges, nodeIds) {
    const children = buildChildMap(edges);
    const roots = getGraphRoots(edges, nodeIds);
    const gen = new Map();
    const queue = roots.map(id => ({ id, level: 1 }));
    roots.forEach(id => gen.set(id, 1));

    while (queue.length) {
      const { id, level } = queue.shift();
      for (const kid of children.get(id) || []) {
        const next = level + 1;
        if (!gen.has(kid) || gen.get(kid) < next) {
          gen.set(kid, next);
          queue.push({ id: kid, level: next });
        }
      }
    }
    return gen;
  }

  function removeGenerationBackgrounds(cy) {
    cy.nodes('[?genBg]').remove();
  }

  function updateGenLegend(generations) {
    const workspace = document.querySelector('.workspace');
    if (!workspace) return;
    let legend = document.getElementById('gen-legend');
    if (!generations.length) {
      if (legend) legend.remove();
      return;
    }
    if (!legend) {
      legend = document.createElement('div');
      legend.id = 'gen-legend';
      legend.className = 'gen-legend';
      workspace.appendChild(legend);
    }
    legend.innerHTML = `<div class="gen-legend-title">Поколения</div>${generations.map(g => {
      const c = GEN_BG_COLORS[(g - 1) % GEN_BG_COLORS.length];
      return `<div class="gen-legend-item"><span class="gen-legend-swatch" style="background:${c.color};opacity:${Math.min(1, c.opacity * 4)}"></span><span>${g} поколение</span></div>`;
    }).join('')}`;
  }

  function applyGenerationBackgrounds(cy) {
    removeGenerationBackgrounds(cy);
    const realNodes = cy.nodes().not('[?genBg]');
    const nodeIds = realNodes.map(n => n.id());
    const genMap = computeGenerations(STATE.edges, nodeIds);
    const byGen = new Map();

    realNodes.forEach(node => {
      const level = genMap.get(node.id());
      if (!level) return;
      if (!byGen.has(level)) byGen.set(level, []);
      byGen.get(level).push(node);
    });

    const padding = 32;
    const levels = [...byGen.keys()].sort((a, b) => a - b);
    levels.forEach(level => {
      const nodes = byGen.get(level);
      let minX = Infinity;
      let minY = Infinity;
      let maxX = -Infinity;
      let maxY = -Infinity;
      nodes.forEach(n => {
        const x = n.position('x');
        const y = n.position('y');
        const w = n.outerWidth();
        const h = n.outerHeight();
        minX = Math.min(minX, x - w / 2);
        maxX = Math.max(maxX, x + w / 2);
        minY = Math.min(minY, y - h / 2);
        maxY = Math.max(maxY, y + h / 2);
      });
      const palette = GEN_BG_COLORS[(level - 1) % GEN_BG_COLORS.length];
      cy.add({
        group: 'nodes',
        data: {
          id: `__gen_bg_${level}`,
          genBg: true,
          genLevel: level,
          bgW: maxX - minX + padding * 2,
          bgH: maxY - minY + padding * 2,
          bgColor: palette.color,
          bgOpacity: palette.opacity,
        },
        position: { x: (minX + maxX) / 2, y: (minY + maxY) / 2 },
      });
    });

    cy.nodes('[?genBg]').moveToBack();
    cy.edges().moveToFront();
    updateGenLegend(levels);
  }

  function clearGenerationUi() {
    const legend = document.getElementById('gen-legend');
    if (legend) legend.remove();
  }

  function buildChildMap(edges) {
    const map = new Map();
    edges.forEach(e => {
      if (!map.has(e.source)) map.set(e.source, []);
      map.get(e.source).push(e.target);
    });
    return map;
  }

  function getGraphRoots(edges, nodeIds) {
    const targets = new Set(edges.map(e => e.target));
    return nodeIds.filter(id => !targets.has(id));
  }

  function singleChildSpineLength(nodeId, children) {
    let len = 1;
    let cur = nodeId;
    while (true) {
      const kids = children.get(cur) || [];
      if (kids.length !== 1) break;
      cur = kids[0];
      len++;
    }
    return len;
  }

  function collectDescendantIds(rootId, children) {
    const ids = new Set();
    (function walk(id) {
      ids.add(id);
      (children.get(id) || []).forEach(walk);
    })(rootId);
    return ids;
  }

  function findHorizontalPivots(edges, nodeIds, minLen) {
    const children = buildChildMap(edges);
    const pivots = [];
    const inZone = new Set();

    function dfs(nodeId) {
      for (const kid of children.get(nodeId) || []) {
        if (inZone.has(kid)) continue;
        if (singleChildSpineLength(kid, children) >= minLen) {
          pivots.push(kid);
          collectDescendantIds(kid, children).forEach(id => inZone.add(id));
        } else {
          dfs(kid);
        }
      }
    }

    getGraphRoots(edges, nodeIds).forEach(dfs);
    return pivots;
  }

  function layoutSubtreeHorizontal(cy, pivotId, subtreeIds, anchorPos) {
    const idSet = subtreeIds;
    let collection = cy.collection();
    idSet.forEach(id => {
      const n = cy.getElementById(id);
      if (n.nonempty()) collection = collection.union(n);
    });
    cy.edges().forEach(e => {
      if (idSet.has(e.source().id()) && idSet.has(e.target().id())) {
        collection = collection.union(e);
      }
    });

    return new Promise(resolve => {
      const layout = collection.layout({
        name: 'dagre',
        rankDir: 'LR',
        ranker: 'network-simplex',
        nodeSep: 55,
        rankSep: 100,
        edgeSep: 20,
        animate: false,
        fit: false,
      });
      layout.one('layoutstop', () => {
        const pivot = cy.getElementById(pivotId);
        if (pivot.nonempty()) {
          const dx = anchorPos.x - pivot.position('x');
          const dy = anchorPos.y - pivot.position('y');
          collection.nodes().forEach(n => {
            const p = n.position();
            n.position({ x: p.x + dx, y: p.y + dy });
          });
        }
        resolve();
      });
      layout.run();
    });
  }

  function shiftSubtreeBy(cy, rootId, dx, dy, children) {
    if (!dx && !dy) return;
    collectDescendantIds(rootId, children).forEach(id => {
      const n = cy.getElementById(id);
      if (n.nonempty()) {
        const p = n.position();
        n.position({ x: p.x + dx, y: p.y + dy });
      }
    });
  }

  async function applyMixedViewLayout(cy) {
    const children = buildChildMap(STATE.edges);
    const gap = 18;

    const wideParents = [...children.entries()]
      .filter(([, kids]) => kids.length >= MIXED_WIDE_MIN)
      .map(([id, kids]) => {
        const node = cy.getElementById(id);
        return {
          id,
          kids,
          y: node.nonempty() ? node.position('y') : 0,
        };
      })
      .sort((a, b) => b.y - a.y);

    for (const { kids: kidIds } of wideParents) {
      const branchRoots = kidIds
        .map(id => cy.getElementById(id))
        .filter(e => e.nonempty())
        .sort((a, b) => a.position('x') - b.position('x'));
      if (branchRoots.length < 2) continue;

      let x = branchRoots[0].position('x') - branchRoots[0].outerWidth() / 2;
      branchRoots.forEach(node => {
        const subtreeIds = collectDescendantIds(node.id(), children);
        let minX = Infinity;
        let maxX = -Infinity;
        subtreeIds.forEach(id => {
          const n = cy.getElementById(id);
          if (n.nonempty()) {
            const left = n.position('x') - n.outerWidth() / 2;
            const right = n.position('x') + n.outerWidth() / 2;
            minX = Math.min(minX, left);
            maxX = Math.max(maxX, right);
          }
        });
        if (!Number.isFinite(minX)) return;
        const subtreeWidth = maxX - minX;
        const dx = x - minX;
        shiftSubtreeBy(cy, node.id(), dx, 0, children);
        x += subtreeWidth + gap;
      });
    }

    const pivots = findHorizontalPivots(
      STATE.edges,
      STATE.nodes.map(n => n.id),
      3,
    );
    for (const pivotId of pivots) {
      const subtreeIds = collectDescendantIds(pivotId, children);
      const pivot = cy.getElementById(pivotId);
      if (pivot.empty()) continue;
      const anchorPos = { x: pivot.position('x'), y: pivot.position('y') };
      await layoutSubtreeHorizontal(cy, pivotId, subtreeIds, anchorPos);
    }
  }

  function setViewMode(mode) {
    if (mode !== 'tree' && mode !== 'mixed') return;
    STATE.viewMode = mode;
    sessionStorage.setItem('ukrop_view', mode);
    updateViewMenuUi();
    renderGraph();
  }

  function updateViewMenuUi() {
    document.querySelectorAll('.view-option').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.view === STATE.viewMode);
    });
  }

  function wireViewMenu() {
    document.querySelectorAll('.view-option').forEach(btn => {
      btn.onclick = () => {
        const menu = document.querySelector('.view-menu');
        if (menu) menu.open = false;
        setViewMode(btn.dataset.view);
      };
    });
    updateViewMenuUi();
  }

  function renderMain() {
    document.getElementById('app').innerHTML = `
      <div class="main-layout">
        <div class="topbar">
          <h1>🌿 Укроп — родословное дерево</h1>
          <span class="status" id="save-status"></span>
          <details class="view-menu">
            <summary class="btn btn-secondary">ВИД</summary>
            <div class="view-menu-panel">
              <button type="button" class="btn btn-secondary view-option" data-view="tree">Дерево</button>
              <button type="button" class="btn btn-secondary view-option" data-view="mixed">ВИД2 — смешанный</button>
              <div class="view-hint">ВИД2: ветки братьев и сестёр идут рядом вбок, остальное — вниз.</div>
            </div>
          </details>
          <button type="button" class="btn btn-secondary" id="btn-export-png">PNG — с днями рождения</button>
          <button class="btn btn-secondary" id="btn-logout">Выйти</button>
        </div>
        <div class="main-row">
          <div class="workspace">
            <div id="cy"></div>
          </div>
          <div class="sidebar scroll-subtle mobile-sheet" id="mobile-sheet">
            <div class="sheet-handle" id="sheet-handle">
              <span class="sheet-handle-bar"></span>
              <span class="sheet-handle-hint" id="sheet-hint">Потяните вниз — свернуть</span>
            </div>
            <div class="sheet-body scroll-subtle">
              <div class="panel" id="edit-panel">
                <h3>Человек</h3>
                <p class="hint">Кликните на узел в дереве</p>
              </div>
              <div class="panel panel-bdays">
                <h3>🎂 Дни рождения</h3>
                <div id="bday-list" class="scroll-subtle"></div>
              </div>
            </div>
          </div>
        </div>
      </div>`;

    document.getElementById('btn-export-png').onclick = () => downloadTreePng();
    wireViewMenu();
    document.getElementById('btn-logout').onclick = () => {
      sessionStorage.removeItem('ukrop_code');
      STATE.code = '';
      renderLogin();
    };

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        renderGraph();
        initMobileSheet();
      });
    });
    renderBirthdays();
    renderEditPanel(null);
  }

  function renderGraph() {
    const container = document.getElementById('cy');
    if (!container) return;

    const selectedId = STATE.selectedId;

    if (STATE.cy) {
      STATE.cy.destroy();
      STATE.cy = null;
    }

    const elements = [
      ...STATE.nodes.map(n => ({ data: nodeCyData(n) })),
      ...STATE.edges.map(e => ({ data: { id: e.id, source: e.source, target: e.target } })),
    ];

    STATE.cy = cytoscape({
      container,
      elements,
      minZoom: 0.08,
      maxZoom: 4,
      wheelSensitivity: 0.28,
      style: [
        { selector: 'node[?genBg]', style: {
          width: 'data(bgW)', height: 'data(bgH)',
          'background-color': 'data(bgColor)',
          'background-opacity': 'data(bgOpacity)',
          'border-width': 0, shape: 'round-rectangle', 'corner-radius': 16,
          label: '', events: 'no', 'z-index': 0,
        }},
        { selector: 'node', style: {
          'background-color': '#3d8f5a', 'label': '', 'color': '#e8edf5',
          'width': 95, 'height': 95,
          'border-width': 2, 'border-color': '#6bcf8e',
          'z-index': 1,
        }},
        { selector: 'node[kind = "couple"]', style: {
          'background-color': '#2d5a6a', 'border-color': '#5ab4d4', 'width': 110, 'height': 100,
        }},
        { selector: 'node[kind = "male"]', style: { 'background-color': '#3d5f8f', 'border-color': '#6a9fd8' }},
        { selector: 'node[kind = "female"]', style: { 'background-color': '#8f3d6a', 'border-color': '#d86a9f' }},
        { selector: 'node:selected', style: { 'background-color': '#4a9eff', 'border-color': '#7bc8ff' }},
        { selector: 'edge', style: {
          'width': 2, 'line-color': '#445566', 'target-arrow-color': '#445566',
          'target-arrow-shape': 'triangle', 'curve-style': 'bezier',
          'z-index': 2,
        }},
      ],
    });

    const layout = STATE.cy.layout({
      name: 'dagre', rankDir: 'TB', ranker: 'network-simplex',
      nodeSep: 55, rankSep: 90, edgeSep: 20, animate: false, fit: false,
    });

    layout.one('layoutstop', () => {
      const finish = () => {
        if (STATE.viewMode === 'mixed') {
          applyGenerationBackgrounds(STATE.cy);
        } else {
          removeGenerationBackgrounds(STATE.cy);
          clearGenerationUi();
        }
        STATE.cy.resize();
        STATE.cy.fit(null, 60);
        if (selectedId) {
          const sel = STATE.cy.getElementById(selectedId);
          if (sel.nonempty()) sel.select();
        }
        setupHtmlLabels(STATE.cy);
      };
      if (STATE.viewMode === 'mixed') {
        applyMixedViewLayout(STATE.cy).then(finish);
      } else {
        finish();
      }
    });
    layout.run();

    STATE.cy.on('tap', evt => {
      if (evt.target === STATE.cy) {
        STATE.selectedId = null;
        STATE.cy.elements().unselect();
        renderEditPanel(null);
        return;
      }
    });

    STATE.cy.on('tap', 'node', evt => {
      if (evt.target.data('genBg')) return;
      const id = evt.target.id();
      STATE.selectedId = id;
      renderEditPanel(id);
    });
  }

  function expandMobileSheet() {
    const sheet = document.getElementById('mobile-sheet');
    if (!sheet || !window.matchMedia('(max-width: 900px)').matches) return;
    const node = STATE.selectedId && STATE.nodes.find(n => n.id === STATE.selectedId);
    const isCouple = node?.ukrop?.type === 'couple';
    const row = document.querySelector('.main-row');
    const h = Math.round((row ? row.clientHeight : window.innerHeight) * (isCouple ? 0.52 : 0.42));
    sheet.style.transition = 'height 0.22s ease-out';
    sheet.style.height = `${h}px`;
    sheet.dataset.sheet = 'half';
    const hint = document.getElementById('sheet-hint');
    if (hint) hint.textContent = 'Потяните вниз — свернуть';
    scheduleCyResize();
  }

  function scheduleCyResize() {
    if (!STATE.cy) return;
    requestAnimationFrame(() => {
      STATE.cy.resize();
    });
  }

  function renderEditPanel(id) {
    const panel = document.getElementById('edit-panel');
    if (!panel) return;
    if (!id) {
      panel.style.display = 'none';
      panel.innerHTML = '';
      scheduleCyResize();
      return;
    }
    panel.style.display = 'block';
    expandMobileSheet();
    const node = STATE.nodes.find(n => n.id === id);
    if (!node) return;
    const ukrop = JSON.parse(JSON.stringify(node.ukrop));

    if (ukrop.type === 'couple' && ukrop.people.length >= 2) {
      const p0 = ukrop.people[0];
      const p1 = ukrop.people[1];
      panel.innerHTML = `
        <h3>Пара (2 человека)</h3>
        <div class="edit-form">
          <div class="edit-section">
            <h4>Человек 1</h4>
            <label>Имя</label>
            <input type="text" id="p0-name" value="${esc(p0.name)}">
            <label>Пол</label>
            ${genderRadioGroup('p0-gender', p0.gender)}
            <label>День рождения</label>
            <input type="date" id="p0-bday" value="${p0.birthday || ''}">
          </div>
          <div class="edit-section">
            <h4>Человек 2</h4>
            <label>Имя</label>
            <input type="text" id="p1-name" value="${esc(p1.name)}">
            <label>Пол</label>
            ${genderRadioGroup('p1-gender', p1.gender)}
            <label>День рождения</label>
            <input type="date" id="p1-bday" value="${p1.birthday || ''}">
          </div>
          <button class="btn btn-ghost-sm" id="btn-to-person">Сделать одним человеком</button>
          <button class="btn btn-primary" id="edit-apply" style="margin-top:8px">Применить</button>
        </div>`;
      document.getElementById('btn-to-person').onclick = () => {
        const name = document.getElementById('p0-name').value.trim() || p0.name;
        const gender = readGender('p0-gender');
        if (!gender) { alert('Укажите пол'); return; }
        ukrop.type = 'person';
        ukrop.people = [{ id: p0.id, name, gender, birthday: document.getElementById('p0-bday').value }];
        updateNodeUkrop(id, ukrop);
        renderEditPanel(id);
        saveNodeChangesToDrive(id, '✓ Применено и сохранено на Drive');
      };
      document.getElementById('edit-apply').onclick = () => {
        applyAndSaveToDrive(id);
      };
      wireEditPanelAutoApply(id);
      scheduleCyResize();
      return;
    }

    const p = ukrop.people[0] || { id: genPersonId(), name: '', gender: '', birthday: '' };
    panel.innerHTML = `
      <h3>Человек</h3>
      <div class="edit-form">
        <label>Имя</label>
        <input type="text" id="edit-name" value="${esc(p.name)}">
        <label>Пол</label>
        ${genderRadioGroup('gender', p.gender)}
        <label>День рождения</label>
        <input type="date" id="edit-bday" value="${p.birthday || ''}">
        <button class="btn btn-ghost-sm" id="btn-to-couple">Сделать парой (2 человека)</button>
        <button class="btn btn-primary" id="edit-apply" style="margin-top:8px">Применить</button>
      </div>`;
    document.getElementById('btn-to-couple').onclick = () => {
      const name = document.getElementById('edit-name').value.trim() || p.name;
      const parts = splitCoupleName(name);
      ukrop.type = 'couple';
      ukrop.people = parts ? [
        { id: genPersonId(), name: parts[0], gender: '', birthday: '' },
        { id: genPersonId(), name: parts[1], gender: '', birthday: document.getElementById('edit-bday').value },
      ] : [
        { id: p.id, name, gender: readGender('gender'), birthday: document.getElementById('edit-bday').value },
        { id: genPersonId(), name: 'Имя', gender: '', birthday: '' },
      ];
      updateNodeUkrop(id, ukrop);
      renderEditPanel(id);
      saveNodeChangesToDrive(id, '✓ Применено и сохранено на Drive');
    };
    document.getElementById('edit-apply').onclick = () => {
      applyAndSaveToDrive(id);
    };
    wireEditPanelAutoApply(id);
    scheduleCyResize();
  }

  function renderBirthdays() {
    const list = document.getElementById('bday-list');
    if (!list) return;
    const withBday = collectAllPeople()
      .filter(p => p.birthday)
      .map(p => ({ ...p, days: daysUntil(p.birthday) }))
      .sort((a, b) => a.birthday.slice(5).localeCompare(b.birthday.slice(5)));

    if (!withBday.length) {
      list.innerHTML = '<p class="hint">Добавьте даты рождения в карточке человека</p>';
      return;
    }

    list.innerHTML = withBday.map(p => {
      let cls = 'bday-item';
      let suffix = '';
      if (p.days === 0) { cls += ' today'; suffix = ' — сегодня!'; }
      else if (p.days !== null && p.days <= 14) { cls += ' soon'; suffix = ` — через ${p.days} дн.`; }
      return `<div class="${cls}"><span>${esc(p.name)}</span><span>${formatBday(p.birthday)}${suffix}</span></div>`;
    }).join('');
  }

  // ─── Init ───
  injectStyles();
  cytoscape.use(cytoscapeDagre);
  if (typeof cytoscapeNodeHtmlLabel !== 'undefined') {
    cytoscape.use(cytoscapeNodeHtmlLabel);
  }

  if (STATE.code && window.UKROP_CONFIG && window.UKROP_CONFIG.APPS_SCRIPT_URL) {
    tryLogin(STATE.code);
  } else {
    renderLogin();
  }
})();
</script>
