<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Укроп — Родословное дерево</title>
  <script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
  <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
  <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
  <script src="https://unpkg.com/cytoscape-node-html-label@1.2.2/dist/cytoscape-node-html-label.js"></script>
  <script src="config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%; font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1419; color: #e8edf5;
    }
  </style>
</head>
<body>

<div id="app"></div>

<script>
(function () {
  'use strict';

  const STATE = {
    code: sessionStorage.getItem('ukrop_code') || '',
    xmlDoc: null,
    keyMap: {},
    birthdayKeyId: null,
    labelKeyId: null,
    userTagsKeyId: null,
    nodes: [],
    edges: [],
    dirty: false,
    cy: null,
    selectedId: null,
  };

  const LABEL_KEYS = ['NodeLabel', 'NodeLabels', 'label', 'name', 'Имя', 'ФИО'];
  const BDAY_KEYS = ['birthday', 'Birthday', 'birthdate', 'День рождения', 'dob'];
  const SKIP_LABEL_KEYS = ['zOrder', 'Expanded', 'url', 'description', 'UserTags'];

  function extractYEdLabel(nodeEl) {
    const all = nodeEl.getElementsByTagName('*');
    for (let i = 0; i < all.length; i++) {
      const el = all[i];
      if (el.localName === 'Label') {
        const text = el.getAttribute('Text') || el.getAttribute('text');
        if (text && text.trim()) return text.trim();
      }
    }
    return '';
  }

  function setYEdLabel(nodeEl, label) {
    const all = nodeEl.getElementsByTagName('*');
    for (let i = 0; i < all.length; i++) {
      const el = all[i];
      if (el.localName === 'Label') {
        el.setAttribute('Text', label);
        return true;
      }
    }
    return false;
  }

  function genPersonId() {
    return 'p' + Math.random().toString(36).slice(2, 10);
  }

  function genderRadioGroup(name, selected) {
    return `<div class="gender-row">
      <label><input type="radio" name="${name}" value="male" ${selected === 'male' ? 'checked' : ''}> Мужчина</label>
      <label><input type="radio" name="${name}" value="female" ${selected === 'female' ? 'checked' : ''}> Женщина</label>
    </div>`;
  }

  function readGender(name) {
    return document.querySelector(`input[name="${name}"]:checked`)?.value || '';
  }

  function findUserTagsKeyId(keyMap) {
    const entry = Object.entries(keyMap).find(([, v]) =>
      v.name === 'UserTags' || String(v.name).toLowerCase() === 'usertags'
    );
    return entry ? entry[0] : 'd6';
  }

  function readJsonFromDataEl(dataEl) {
    if (!dataEl) return {};
    const jsonEl = [...dataEl.getElementsByTagName('*')].find(e => e.localName === 'Json');
    const text = (jsonEl ? jsonEl.textContent : dataEl.textContent || '').trim();
    if (!text) return {};
    try { return JSON.parse(text); } catch { return {}; }
  }

  function stripUkropViewFromDoc() {
    const graph = STATE.xmlDoc?.querySelector('graph');
    if (!graph) return;
    const kid = findUserTagsKeyId(STATE.keyMap);
    const dataEl = graph.querySelector(':scope > data[key="' + kid + '"]');
    if (!dataEl) return;
    const wrapper = readJsonFromDataEl(dataEl);
    if (!wrapper.ukropView) return;
    delete wrapper.ukropView;
    let jsonEl = [...dataEl.getElementsByTagName('*')].find(e => e.localName === 'Json');
    if (!jsonEl) {
      jsonEl = STATE.xmlDoc.createElement('y:Json');
      dataEl.appendChild(jsonEl);
    }
    jsonEl.textContent = JSON.stringify(wrapper);
  }

  function splitCoupleName(label) {
    const parts = label.split(/\s*[-–—/|]\s*|\s+и\s+/i).map(s => s.trim()).filter(Boolean);
    return parts.length >= 2 ? parts.slice(0, 2) : null;
  }

  function normalizeUkropPeople(ukrop) {
    if (!ukrop?.people) return;
    ukrop.people.forEach(p => { delete p.role; });
  }

  function migrateLabelToUkrop(label, birthday) {
    const pair = splitCoupleName(label);
    if (pair) {
      return {
        type: 'couple',
        people: [
          { id: genPersonId(), name: pair[0], gender: '', birthday: '' },
          { id: genPersonId(), name: pair[1], gender: '', birthday: '' },
        ],
      };
    }
    return {
      type: 'person',
      people: [{ id: genPersonId(), name: label, gender: '', birthday: birthday || '' }],
    };
  }

  function parseUkropFromNode(nodeEl, label, birthday, keyMap) {
    const kid = findUserTagsKeyId(keyMap);
    const dataEl = nodeEl.querySelector(`data[key="${kid}"]`);
    const wrapper = readJsonFromDataEl(dataEl);
    if (wrapper.ukrop && Array.isArray(wrapper.ukrop.people) && wrapper.ukrop.people.length) {
      const ukrop = wrapper.ukrop;
      ukrop.people.forEach(p => { if (!p.id) p.id = genPersonId(); });
      normalizeUkropPeople(ukrop);
      return ukrop;
    }
    const ukrop = migrateLabelToUkrop(label, birthday);
    if (birthday && ukrop.type === 'person' && ukrop.people[0]) {
      ukrop.people[0].birthday = birthday;
    }
    return ukrop;
  }

  function ukropYEdLabel(ukrop) {
    if (ukrop.type === 'couple' && ukrop.people.length >= 2) {
      return ukrop.people.map(p => p.name).join(' - ');
    }
    return ukrop.people[0]?.name || '';
  }

  function ukropDisplayLabel(ukrop) {
    const people = ukrop.people || [];
    if (ukrop.type === 'couple' && people.length >= 2) {
      return `${people[0].name} - ${people[1].name}`;
    }
    return people[0]?.name || '?';
  }

  function ukropNodeSublabel(ukrop) {
    if (ukrop.type === 'couple' && ukrop.people.length >= 2) {
      const a = ukrop.people[0];
      const b = ukrop.people[1];
      const da = a.birthday ? formatBday(a.birthday) : '';
      const db = b.birthday ? formatBday(b.birthday) : '';
      if (da && db) return `\n[${da} - ${db}]`;
      if (da) return `\n[${da}]`;
      if (db) return `\n[${db}]`;
      return '';
    }
    const bday = ukrop.people[0]?.birthday;
    return bday ? `\n[${formatBday(bday)}]` : '';
  }

  function writeUkropToNode(nodeEl, ukrop, keyMap) {
    const kid = findUserTagsKeyId(keyMap);
    let dataEl = nodeEl.querySelector(`data[key="${kid}"]`);
    if (!dataEl) {
      dataEl = nodeEl.ownerDocument.createElement('data');
      dataEl.setAttribute('key', kid);
      nodeEl.appendChild(dataEl);
    }
    const wrapper = readJsonFromDataEl(dataEl);
    wrapper.ukrop = ukrop;
    let jsonEl = [...dataEl.getElementsByTagName('*')].find(e => e.localName === 'Json');
    if (!jsonEl) {
      jsonEl = nodeEl.ownerDocument.createElement('y:Json');
      dataEl.appendChild(jsonEl);
    }
    jsonEl.textContent = JSON.stringify(wrapper);
    setYEdLabel(nodeEl, ukropYEdLabel(ukrop));
  }

  function collectAllPeople() {
    const result = [];
    for (const n of STATE.nodes) {
      for (const p of (n.ukrop?.people || [])) {
        result.push({ ...p, nodeId: n.id });
      }
    }
    return result;
  }

  function nodeKind(ukrop) {
    if (ukrop.type === 'couple') return 'couple';
    const g = ukrop.people[0]?.gender;
    if (g === 'male') return 'male';
    if (g === 'female') return 'female';
    return 'person';
  }

  // ─── API (Google Apps Script + Drive) ───
  function apiUrl(params) {
    const base = (window.UKROP_CONFIG && window.UKROP_CONFIG.APPS_SCRIPT_URL) || '';
    if (!base) throw new Error('Настройте APPS_SCRIPT_URL в config.js');
    const q = new URLSearchParams(params);
    return base + (base.includes('?') ? '&' : '?') + q.toString();
  }

  async function loadGraphML(code) {
    const url = apiUrl({ action: 'load', code });
    const res = await fetch(url);
    const text = await res.text();
    if (text.trim().startsWith('{') && text.includes('error')) {
      const err = JSON.parse(text);
      throw new Error(err.error || 'Ошибка загрузки');
    }
    if (!text.includes('<graphml') && !text.includes('<graph')) {
      throw new Error('Ответ не похож на GraphML. Проверьте Apps Script и FILE_ID.');
    }
    return text;
  }

  async function saveGraphML(code, content) {
    const base = window.UKROP_CONFIG.APPS_SCRIPT_URL;
    const res = await fetch(base, {
      method: 'POST',
      body: JSON.stringify({ action: 'save', code, content }),
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Ошибка сохранения');
    return data;
  }

  // ─── GraphML ───
  function parseGraphML(xml) {
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    const parseErr = doc.querySelector('parsererror');
    if (parseErr) throw new Error('Ошибка разбора GraphML');

    const keyMap = {};
    doc.querySelectorAll('key').forEach(k => {
      keyMap[k.getAttribute('id')] = {
        name: k.getAttribute('attr.name') || k.getAttribute('id'),
        forType: k.getAttribute('for'),
        type: k.getAttribute('attr.type') || 'string',
      };
    });

    let birthdayKeyId = Object.entries(keyMap).find(([, v]) =>
      v.forType === 'node' && BDAY_KEYS.some(b => b.toLowerCase() === v.name.toLowerCase())
    )?.[0];

    let labelKeyId = Object.entries(keyMap).find(([, v]) =>
      v.forType === 'node' && LABEL_KEYS.some(l => l.toLowerCase() === v.name.toLowerCase())
    )?.[0];

    const graph = doc.getElementsByTagName('graph')[0];
    if (!graph) throw new Error('В GraphML нет элемента graph');

    const nodes = [];
    const nodeEls = graph.getElementsByTagName('node');
    for (let ni = 0; ni < nodeEls.length; ni++) {
      const nodeEl = nodeEls[ni];
      if (nodeEl.parentElement !== graph) continue;
      const id = nodeEl.getAttribute('id');
      const attrs = {};
      nodeEl.querySelectorAll(':scope > data').forEach(d => {
        const kid = d.getAttribute('key');
        const kname = keyMap[kid]?.name || kid;
        attrs[kname] = d.textContent;
        attrs['_' + kid] = d.textContent;
      });

      let label = extractYEdLabel(nodeEl);

      if (!label) {
        for (const k of LABEL_KEYS) {
          if (attrs[k]) { label = attrs[k]; labelKeyId = labelKeyId || findKeyByName(keyMap, k); break; }
        }
      }

      if (!label) {
        const desc = attrs.description || attrs['description'];
        if (desc && desc.trim()) label = desc.trim();
      }

      if (!label) {
        for (const d of nodeEl.querySelectorAll(':scope > data')) {
          const kid = d.getAttribute('key');
          const kname = keyMap[kid]?.name || '';
          if (SKIP_LABEL_KEYS.includes(kname) || kname.includes('Geometry') || kname.includes('Style')) continue;
          const val = (d.textContent || '').trim();
          if (val && val.length < 80 && !val.startsWith('<') && !val.startsWith('{')) {
            label = val;
            if (!labelKeyId) labelKeyId = kid;
            break;
          }
        }
      }

      if (!label) label = id;

      let birthday = '';
      for (const k of BDAY_KEYS) {
        if (attrs[k]) { birthday = attrs[k]; birthdayKeyId = birthdayKeyId || findKeyByName(keyMap, k); break; }
      }

      const ukrop = parseUkropFromNode(nodeEl, label, birthday, keyMap);

      nodes.push({
        id, label: ukropDisplayLabel(ukrop), birthday, el: nodeEl, attrs, ukrop,
        kind: nodeKind(ukrop),
      });
    }

    const userTagsKeyId = findUserTagsKeyId(keyMap);

    const nodeIds = new Set(nodes.map(n => n.id));
    const edges = [];
    const edgeEls = graph.getElementsByTagName('edge');
    for (let ei = 0; ei < edgeEls.length; ei++) {
      const edgeEl = edgeEls[ei];
      if (edgeEl.parentElement !== graph) continue;
      const source = edgeEl.getAttribute('source');
      const target = edgeEl.getAttribute('target');
      if (!source || !target || !nodeIds.has(source) || !nodeIds.has(target)) continue;
      edges.push({
        id: edgeEl.getAttribute('id') || (source + '_' + target),
        source, target,
      });
    }

    return { doc, keyMap, nodes, edges, birthdayKeyId, labelKeyId, userTagsKeyId };
  }

  function findKeyByName(keyMap, name) {
    return Object.entries(keyMap).find(([, v]) => v.name === name)?.[0];
  }

  function ensureBirthdayKey(doc, keyMap) {
    if (STATE.birthdayKeyId && keyMap[STATE.birthdayKeyId]) return STATE.birthdayKeyId;
    const graphml = doc.documentElement;
    const id = 'ukrop_birthday';
    const keyEl = doc.createElement('key');
    keyEl.setAttribute('id', id);
    keyEl.setAttribute('for', 'node');
    keyEl.setAttribute('attr.name', 'birthday');
    keyEl.setAttribute('attr.type', 'string');
    const graph = doc.querySelector('graph');
    graphml.insertBefore(keyEl, graph);
    keyMap[id] = { name: 'birthday', forType: 'node', type: 'string' };
    STATE.birthdayKeyId = id;
    return id;
  }

  function ensureLabelKey(doc, keyMap, nodeEl) {
    if (STATE.labelKeyId && keyMap[STATE.labelKeyId]) return STATE.labelKeyId;
    const first = nodeEl.querySelector('data');
    if (first) {
      STATE.labelKeyId = first.getAttribute('key');
      return STATE.labelKeyId;
    }
    const id = 'ukrop_label';
    const graphml = doc.documentElement;
    const keyEl = doc.createElement('key');
    keyEl.setAttribute('id', id);
    keyEl.setAttribute('for', 'node');
    keyEl.setAttribute('attr.name', 'NodeLabel');
    keyEl.setAttribute('attr.type', 'string');
    const graph = doc.querySelector('graph');
    graphml.insertBefore(keyEl, graph);
    keyMap[id] = { name: 'NodeLabel', forType: 'node', type: 'string' };
    STATE.labelKeyId = id;
    return id;
  }

  function setNodeData(nodeEl, keyId, value) {
    let dataEl = nodeEl.querySelector(`data[key="${keyId}"]`);
    if (!dataEl) {
      dataEl = nodeEl.ownerDocument.createElement('data');
      dataEl.setAttribute('key', keyId);
      nodeEl.appendChild(dataEl);
    }
    dataEl.textContent = value;
  }

  function updateNodeUkrop(id, ukrop) {
    const node = STATE.nodes.find(n => n.id === id);
    if (!node) return;
    normalizeUkropPeople(ukrop);
    writeUkropToNode(node.el, ukrop, STATE.keyMap);
    node.ukrop = ukrop;
    node.label = ukropDisplayLabel(ukrop);
    node.kind = nodeKind(ukrop);
    node.birthday = ukrop.people[0]?.birthday || '';
    STATE.dirty = true;
    if (STATE.cy) {
      refreshNodeOnGraph(id);
    } else {
      renderGraph();
    }
    renderBirthdays();
  }

  function nodeCyData(n) {
    return {
      id: n.id,
      nameLine: n.label,
      bdayLine: ukropNodeSublabel(n.ukrop).trim(),
      kind: n.kind,
    };
  }

  function setupHtmlLabels(cy) {
    if (!cy.nodeHtmlLabel) return;
    cy.nodeHtmlLabel([{
      query: 'node',
      halign: 'center',
      valign: 'center',
      halignBox: 'center',
      valignBox: 'center',
      tpl(data) {
        const bday = data.bdayLine
          ? `<div class="cy-bday">${escHtml(data.bdayLine)}</div>` : '';
        const wrapCls = bday ? 'cy-node-text has-bday' : 'cy-node-text';
        return `<div class="${wrapCls}"><div class="cy-name">${escHtml(data.nameLine)}</div>${bday}</div>`;
      },
    }]);
  }

  function refreshNodeOnGraph(id) {
    if (!STATE.cy) return;
    const node = STATE.nodes.find(n => n.id === id);
    if (!node) return;
    const ele = STATE.cy.getElementById(id);
    if (ele.nonempty()) ele.data(nodeCyData(node));
  }

  function serializeGraphML() {
    return new XMLSerializer().serializeToString(STATE.xmlDoc);
  }

  // ─── UI helpers ───
  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function escHtml(s) {
    return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function formatBday(b) {
    if (!b) return '—';
    const m = b.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (m) return `${m[3]}.${m[2]}.${m[1]}`;
    return b;
  }

  function daysUntil(bday) {
    if (!bday || !/^\d{4}-\d{2}-\d{2}$/.test(bday)) return null;
    const [, y, mo, d] = bday.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    const now = new Date();
    let next = new Date(now.getFullYear(), +mo - 1, +d);
    if (next < new Date(now.getFullYear(), now.getMonth(), now.getDate())) {
      next = new Date(now.getFullYear() + 1, +mo - 1, +d);
    }
    return Math.ceil((next - now) / 86400000);
  }

  function injectStyles() {
    if (document.getElementById('ukrop-styles')) return;
    const s = document.createElement('style');
    s.id = 'ukrop-styles';
    s.textContent = `
      #app { min-height: 100%; display: flex; flex-direction: column; }

        background: linear-gradient(135deg, #6bcf8e, #4a9eff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
      .sub { color: #8899aa; margin-bottom: 1.5rem; text-align: center; }

      .topbar { grid-column: 1 / -1; display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: #1a222d; border-bottom: 1px solid #2a3848; flex-wrap: wrap; }

      .cy-node-text.has-bday { transform: translateY(10px); }

  // ─── Screens ───
  function renderLogin(err) {
    const hasConfig = window.UKROP_CONFIG && window.UKROP_CONFIG.APPS_SCRIPT_URL;
    document.getElementById('app').innerHTML = `
      <div class="screen">
        <div class="logo">🌿 Укроп</div>
        <p class="sub">Родословное дерево · доступ по коду семьи</p>
        <div class="card">
          ${!hasConfig ? '<p class="err">Сайт не настроен: укажите APPS_SCRIPT_URL в config.js</p>' : ''}
          <label for="code">Код доступа</label>
          <input type="password" id="code" placeholder="Введите код семьи" autocomplete="off">
          <button class="btn btn-primary" id="btn-enter" ${!hasConfig ? 'disabled' : ''}>Войти</button>
          ${err ? `<p class="err">${esc(err)}</p>` : ''}
          <p class="hint" style="margin-top:1rem">Данные хранятся в Укроп.graphml на Google Drive.<br>
          <a class="back-link" href="https://ayanzhexenbay.github.io/Labyrinth/">← Игра Лабиринт</a></p>
        </div>
      </div>`;
    const inp = document.getElementById('code');
    if (STATE.code) inp.value = STATE.code;
    document.getElementById('btn-enter').onclick = () => tryLogin(inp.value);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(inp.value); });
  }

  async function tryLogin(code) {
    try {
      const xml = await loadGraphML(code.trim());
      STATE.code = code.trim();
      sessionStorage.setItem('ukrop_code', STATE.code);
      const parsed = parseGraphML(xml);
      STATE.xmlDoc = parsed.doc;
      STATE.keyMap = parsed.keyMap;
      STATE.nodes = parsed.nodes;
      STATE.edges = parsed.edges;
      STATE.birthdayKeyId = parsed.birthdayKeyId;
      STATE.labelKeyId = parsed.labelKeyId;
      STATE.userTagsKeyId = parsed.userTagsKeyId;
      stripUkropViewFromDoc();
      STATE.dirty = false;
      renderMain();
    } catch (e) {
      renderLogin(e.message);
    }
  }

  function renderMain() {
    document.getElementById('app').innerHTML = `
      <div class="main-layout">
        <div class="topbar">
          <h1>🌿 Укроп — родословное дерево</h1>
          <span class="status" id="save-status"></span>
          <button class="btn btn-save" id="btn-save">Сохранить на Drive</button>
          <button class="btn btn-secondary" id="btn-logout">Выйти</button>
        </div>
        <div id="cy"></div>
        <div class="sidebar">
          <div class="panel" id="edit-panel">
            <h3>Человек</h3>
            <p class="hint">Кликните на узел в дереве</p>
          </div>
          <div class="panel">
            <h3>🎂 Дни рождения</h3>
            <div id="bday-list"></div>
          </div>
        </div>
      </div>`;

    document.getElementById('btn-logout').onclick = () => {
      sessionStorage.removeItem('ukrop_code');
      STATE.code = '';
      renderLogin();
    };

    document.getElementById('btn-save').onclick = async () => {
      const btn = document.getElementById('btn-save');
      const st = document.getElementById('save-status');
      btn.disabled = true;
      st.textContent = 'Сохранение...';
      try {
        stripUkropViewFromDoc();
        await saveGraphML(STATE.code, serializeGraphML());
        STATE.dirty = false;
        btn.classList.remove('dirty');
        st.textContent = '✓ Сохранено на Google Drive';
        setTimeout(() => { st.textContent = ''; }, 3000);
      } catch (e) {
        st.textContent = '';
        alert(e.message);
      }
      btn.disabled = false;
    };

    requestAnimationFrame(() => {
      requestAnimationFrame(() => renderGraph());
    });
    renderBirthdays();
    renderEditPanel(null);
  }

  function renderGraph() {
    const container = document.getElementById('cy');
    if (!container) return;

    const selectedId = STATE.selectedId;

    if (STATE.cy) {
      STATE.cy.destroy();
      STATE.cy = null;
    }

    const elements = [
      ...STATE.nodes.map(n => ({ data: nodeCyData(n) })),
      ...STATE.edges.map(e => ({ data: { id: e.id, source: e.source, target: e.target } })),
    ];

    STATE.cy = cytoscape({
      container,
      elements,
      minZoom: 0.08,
      maxZoom: 4,
      wheelSensitivity: 0.28,
      style: [
        { selector: 'node', style: {
          'background-color': '#3d8f5a', 'label': '', 'color': '#e8edf5',
          'width': 95, 'height': 95,
          'border-width': 2, 'border-color': '#6bcf8e',
        }},
        { selector: 'node[kind = "couple"]', style: {
          'background-color': '#2d5a6a', 'border-color': '#5ab4d4', 'width': 110, 'height': 100,
        }},
        { selector: 'node[kind = "male"]', style: { 'background-color': '#3d5f8f', 'border-color': '#6a9fd8' }},
        { selector: 'node[kind = "female"]', style: { 'background-color': '#8f3d6a', 'border-color': '#d86a9f' }},
        { selector: 'node:selected', style: { 'background-color': '#4a9eff', 'border-color': '#7bc8ff' }},
        { selector: 'edge', style: {
          'width': 2, 'line-color': '#445566', 'target-arrow-color': '#445566',
          'target-arrow-shape': 'triangle', 'curve-style': 'bezier',
        }},
      ],
    });

    const layout = STATE.cy.layout({
      name: 'dagre', rankDir: 'TB', ranker: 'network-simplex',
      nodeSep: 55, rankSep: 90, edgeSep: 20, animate: false, fit: false,
    });

    layout.one('layoutstop', () => {
      STATE.cy.resize();
      STATE.cy.fit(null, 60);
      if (selectedId) {
        const sel = STATE.cy.getElementById(selectedId);
        if (sel.nonempty()) sel.select();
      }
      setupHtmlLabels(STATE.cy);
    });
    layout.run();

    STATE.cy.on('tap', evt => {
      if (evt.target === STATE.cy) {
        STATE.selectedId = null;
        STATE.cy.elements().unselect();
        renderEditPanel(null);
        return;
      }
    });

    STATE.cy.on('tap', 'node', evt => {
      const id = evt.target.id();
      STATE.selectedId = id;
      renderEditPanel(id);
    });
  }

  function renderEditPanel(id) {
    const panel = document.getElementById('edit-panel');
    if (!panel) return;
    if (!id) {
      panel.style.display = 'none';
      panel.innerHTML = '';
      return;
    }
    panel.style.display = 'block';
    const node = STATE.nodes.find(n => n.id === id);
    if (!node) return;
    const ukrop = JSON.parse(JSON.stringify(node.ukrop));

    if (ukrop.type === 'couple' && ukrop.people.length >= 2) {
      const p0 = ukrop.people[0];
      const p1 = ukrop.people[1];
      panel.innerHTML = `
        <h3>Пара (2 человека)</h3>
        <div class="edit-form">
          <div class="edit-section">
            <h4>Человек 1</h4>
            <label>Имя</label>
            <input type="text" id="p0-name" value="${esc(p0.name)}">
            <label>Пол</label>
            ${genderRadioGroup('p0-gender', p0.gender)}
            <label>День рождения</label>
            <input type="date" id="p0-bday" value="${p0.birthday || ''}">
          </div>
          <div class="edit-section">
            <h4>Человек 2</h4>
            <label>Имя</label>
            <input type="text" id="p1-name" value="${esc(p1.name)}">
            <label>Пол</label>
            ${genderRadioGroup('p1-gender', p1.gender)}
            <label>День рождения</label>
            <input type="date" id="p1-bday" value="${p1.birthday || ''}">
          </div>
          <button class="btn btn-ghost-sm" id="btn-to-person">Сделать одним человеком</button>
          <button class="btn btn-primary" id="edit-apply" style="margin-top:8px">Применить</button>
        </div>`;
      document.getElementById('btn-to-person').onclick = () => {
        const name = document.getElementById('p0-name').value.trim() || p0.name;
        const gender = readGender('p0-gender');
        if (!gender) { alert('Укажите пол'); return; }
        ukrop.type = 'person';
        ukrop.people = [{ id: p0.id, name, gender, birthday: document.getElementById('p0-bday').value }];
        updateNodeUkrop(id, ukrop);
        document.getElementById('btn-save').classList.add('dirty');
        renderEditPanel(id);
      };
      document.getElementById('edit-apply').onclick = () => {
        p0.name = document.getElementById('p0-name').value.trim();
        p1.name = document.getElementById('p1-name').value.trim();
        p0.birthday = document.getElementById('p0-bday').value;
        p1.birthday = document.getElementById('p1-bday').value;
        p0.gender = readGender('p0-gender');
        p1.gender = readGender('p1-gender');
        if (!p0.name || !p1.name) { alert('Введите оба имени'); return; }
        if (!p0.gender || !p1.gender) { alert('Укажите пол для обоих'); return; }
        updateNodeUkrop(id, ukrop);
        document.getElementById('btn-save').classList.add('dirty');
        renderEditPanel(id);
      };
      return;
    }

    const p = ukrop.people[0] || { id: genPersonId(), name: '', gender: '', birthday: '' };
    panel.innerHTML = `
      <h3>Человек</h3>
      <div class="edit-form">
        <label>Имя</label>
        <input type="text" id="edit-name" value="${esc(p.name)}">
        <label>Пол</label>
        ${genderRadioGroup('gender', p.gender)}
        <label>День рождения</label>
        <input type="date" id="edit-bday" value="${p.birthday || ''}">
        <button class="btn btn-ghost-sm" id="btn-to-couple">Сделать парой (2 человека)</button>
        <button class="btn btn-primary" id="edit-apply" style="margin-top:8px">Применить</button>
      </div>`;
    document.getElementById('btn-to-couple').onclick = () => {
      const name = document.getElementById('edit-name').value.trim() || p.name;
      const parts = splitCoupleName(name);
      ukrop.type = 'couple';
      ukrop.people = parts ? [
        { id: genPersonId(), name: parts[0], gender: '', birthday: '' },
        { id: genPersonId(), name: parts[1], gender: '', birthday: document.getElementById('edit-bday').value },
      ] : [
        { id: p.id, name, gender: readGender('gender'), birthday: document.getElementById('edit-bday').value },
        { id: genPersonId(), name: 'Имя', gender: '', birthday: '' },
      ];
      updateNodeUkrop(id, ukrop);
      document.getElementById('btn-save').classList.add('dirty');
      renderEditPanel(id);
    };
    document.getElementById('edit-apply').onclick = () => {
      const name = document.getElementById('edit-name').value.trim();
      const bday = document.getElementById('edit-bday').value;
      const gender = readGender('gender');
      if (!name) { alert('Введите имя'); return; }
      if (!gender) { alert('Укажите пол'); return; }
      ukrop.type = 'person';
      ukrop.people = [{ id: p.id, name, gender, birthday: bday }];
      updateNodeUkrop(id, ukrop);
      document.getElementById('btn-save').classList.add('dirty');
      renderEditPanel(id);
    };
  }

  function renderBirthdays() {
    const list = document.getElementById('bday-list');
    if (!list) return;
    const withBday = collectAllPeople()
      .filter(p => p.birthday)
      .map(p => ({ ...p, days: daysUntil(p.birthday) }))
      .sort((a, b) => a.birthday.slice(5).localeCompare(b.birthday.slice(5)));

    if (!withBday.length) {
      list.innerHTML = '<p class="hint">Добавьте даты рождения в карточке человека</p>';
      return;
    }

    list.innerHTML = withBday.map(p => {
      let cls = 'bday-item';
      let suffix = '';
      if (p.days === 0) { cls += ' today'; suffix = ' — сегодня!'; }
      else if (p.days !== null && p.days <= 14) { cls += ' soon'; suffix = ` — через ${p.days} дн.`; }
      return `<div class="${cls}"><span>${esc(p.name)}</span><span>${formatBday(p.birthday)}${suffix}</span></div>`;
    }).join('');
  }

  // ─── Init ───
  injectStyles();
  cytoscape.use(cytoscapeDagre);
  if (typeof cytoscapeNodeHtmlLabel !== 'undefined') {
    cytoscape.use(cytoscapeNodeHtmlLabel);
  }

  if (STATE.code && window.UKROP_CONFIG && window.UKROP_CONFIG.APPS_SCRIPT_URL) {
    tryLogin(STATE.code);
  } else {
    renderLogin();
  }
})();
</script>
</body>
</html>
